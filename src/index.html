<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LRXC47V0B8"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())

      gtag('config', 'G-LRXC47V0B8')
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Independence — The Turkish War of Independence</title>
    <!-- Installed to the home screen the game runs with no browser chrome at
         all, which is the only way to be rid of Safari's toolbar in landscape:
         iOS exposes no API for hiding it, and only auto-hides it on a page that
         scrolls — and this one never scrolls, it pans. -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon-192.png" type="image/png" />
    <!-- iOS ignores an SVG apple-touch-icon and falls back to a screenshot -->
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
    <meta name="theme-color" content="#2e2419" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Independence" />
    <!-- Every baked composition is intentionally preloaded. Rotation and
         language changes must never reveal a blank frame between variants. -->
    <link rel="preload" as="image" type="image/jpeg" href="assets/intro-background-baked-en-v2.jpg" />
    <link rel="preload" as="image" type="image/jpeg" href="assets/intro-background-square-baked-en-v2.jpg" />
    <link rel="preload" as="image" type="image/jpeg" href="assets/intro-background-vertical-baked-en-v2.jpg" />
    <link rel="preload" as="image" type="image/jpeg" href="assets/intro-background-baked-tr.jpg" />
    <link rel="preload" as="image" type="image/jpeg" href="assets/intro-background-square-baked-tr.jpg" />
    <link rel="preload" as="image" type="image/jpeg" href="assets/intro-background-vertical-baked-tr.jpg" />
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/game.css" />
    <link rel="stylesheet" href="styles/map.css" />
    <style>
      /* boot screen: static markup inside #app, shown while the bundle loads;
         React wipes it automatically on first render */
      .boot-screen {
        position: fixed;
        inset: 0;
        z-index: 60;
        isolation: isolate;
        overflow: hidden;
        background: transparent;
        font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
        color: #ecd9a0;
      }
      .boot-screen h1 {
        margin: 0;
        font-size: 36px;
        letter-spacing: 7px;
        font-weight: 700;
      }
      .boot-screen p {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .boot-signal {
        position: absolute;
        top: 57%;
        left: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: min(286px, calc(100vw - 32px));
        padding: 11px 15px 10px;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(224, 200, 140, 0.76);
        border-radius: 2px;
        background: rgba(28, 19, 10, 0.86);
        color: #ead59a;
        box-shadow:
          0 10px 28px rgba(10, 7, 3, 0.3),
          inset 0 0 0 1px rgba(255, 246, 217, 0.06);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      }
      .boot-signal::before,
      .boot-signal::after {
        content: '';
        width: 42px;
        height: 1px;
        background: linear-gradient(90deg, transparent, currentColor);
      }
      .boot-signal::after {
        transform: scaleX(-1);
      }
      .boot-sigil {
        font-size: 14px;
        line-height: 1;
        animation: boot-breathe 1.6s ease-in-out infinite;
      }
      .boot-status {
        margin-left: -2px;
        font-family: 'Avenir Next', 'Segoe UI', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 3.4px;
      }
      @keyframes boot-breathe {
        0%, 100% { opacity: 0.32; }
        50% { opacity: 1; }
      }
      @media (max-aspect-ratio: 4/3) {
        .boot-signal {
          top: 52%;
        }
      }
      @media (max-aspect-ratio: 7/8) {
        .boot-signal {
          top: 55%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-sigil {
          animation: none;
          opacity: 0.72;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="opening-background" class="opening-scene-background" data-lang="en" aria-hidden="true"></div>
      <div class="boot-screen" data-lang="en">
        <p id="boot-subtitle">War of Independence · 1919</p>
        <div class="boot-signal" aria-hidden="true">
          <span class="boot-sigil">✦</span>
          <span id="boot-status" class="boot-status">LOADING</span>
        </div>
      </div>
    </div>
    <script>
      // the boot screen paints before the bundle loads — localize it inline so
      // Turkish users never see an English flash (mirrors detectInitial in i18n.ts)
      ;(function () {
        window.__openingBootStartedAt = performance.now()
        var saved = null
        try {
          saved = localStorage.getItem('independence.lang')
        } catch (e) {}
        var lang = saved === 'en' || saved === 'tr' ? saved : /^tr\b/i.test(navigator.language || '') ? 'tr' : 'en'
        document.querySelector('.boot-screen').setAttribute('data-lang', lang)
        document.getElementById('opening-background').setAttribute('data-lang', lang)
        if (lang === 'tr') {
          document.getElementById('boot-subtitle').textContent = 'Kurtuluş Savaşı · 1919'
          document.getElementById('boot-status').textContent = 'YÜKLENİYOR'
        }
        document.documentElement.lang = lang
      })()
    </script>
    <script type="module" src="index.js"></script>
  </body>
</html>
